name: Security checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  python-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pip-audit

      - name: Verify Python compilation
        run: |
          python -m py_compile app.py
          python -m py_compile route_engine/gpx_library.py
          python -m py_compile route_engine/map_view.py
          python -m py_compile route_engine/storage.py

      - name: Audit Python dependencies
        run: python -m pip_audit -r requirements.txt

